# Control Mapping — atoevidence package format
# ATO Control Traceability Engine
# SPDX-License-Identifier: Apache-2.0
#
# This file is consumed by the `atoevidence` CLI (atoevidence validate /
# build-index / status-report / freshness / oscal / bundle).
#
# Each control entry references implementation documentation, evidence
# artifacts, and monitoring records using paths relative to the repository root.

controls:

  AC-1:
    name: Access Control Policy and Procedures
    owner: Security Engineering Team
    review_frequency_days: 365
    implementation: docs/design-decisions.md
    evidence:
      - examples/evidence/ac-2-account-audit.yaml
    monitoring:
      - docs/use-cases.md

